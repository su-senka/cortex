<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Docs Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1e40af;
      color: #fff;
      padding: 0 1.25rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.0625rem; font-weight: 600; }
    .header-spacer { flex: 1; }
    .header-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .header-btn:hover { background: rgba(255,255,255,0.25); }
    .user-chip {
      font-size: 0.8rem;
      opacity: 0.85;
      white-space: nowrap;
    }

    /* ── Three-column layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── History pane (left) ── */
    .history-pane {
      width: 240px;
      background: #1e293b;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .history-pane-header {
      padding: 0.75rem 0.875rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .new-chat-btn {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.875rem;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.14); }
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.375rem 0;
    }
    .conv-item {
      padding: 0.55rem 0.875rem;
      cursor: pointer;
      border-radius: 6px;
      margin: 0.125rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      min-width: 0;
    }
    .conv-item:hover { background: rgba(255,255,255,0.07); }
    .conv-item.active { background: rgba(255,255,255,0.12); }
    .conv-title {
      flex: 1;
      font-size: 0.8125rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cbd5e1;
    }
    .conv-item.active .conv-title { color: #f1f5f9; }
    .conv-delete {
      opacity: 0;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.1rem 0.2rem;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: #f87171; background: rgba(255,255,255,0.08); }
    .conv-list-empty {
      font-size: 0.775rem;
      color: #64748b;
      padding: 0.75rem 1rem;
    }

    /* ── Chat pane ── */
    .chat-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message { max-width: 780px; width: 100%; }
    .message.user      { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .bubble {
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble {
      background: #1e40af;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .assistant .bubble {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 3px;
    }
    .bubble .cite-ref {
      color: #1e40af;
      text-decoration: none;
      font-size: 0.72em;
      font-weight: 700;
      vertical-align: super;
      line-height: 0;
      margin-left: 1px;
    }
    .bubble .cite-ref:hover { text-decoration: underline; }

    .thinking {
      color: #6b7280;
      font-size: 0.85rem;
      padding: 0.25rem 0;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Input bar ── */
    .input-bar {
      padding: 0.875rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 0.5rem;
    }
    .input-bar textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.9375rem;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      max-height: 130px;
      overflow-y: auto;
    }
    .input-bar textarea:focus { border-color: #1e40af; box-shadow: 0 0 0 2px #bfdbfe; }
    .input-bar button {
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.1rem;
      font-size: 0.9375rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      height: 38px;
    }
    .input-bar button:hover { background: #1d4ed8; }
    .input-bar button:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Sources pane (right) ── */
    .sources-pane {
      width: 280px;
      background: #fff;
      border-left: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sources-pane h2 {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      padding: 0.875rem 1rem 0.5rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .sources-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .source-item {
      padding: 0.55rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: background 0.1s;
    }
    .source-item:last-child { border-bottom: none; }
    .source-item:hover { background: #f9fafb; }
    .source-item.cited { background: #eff6ff; }
    .source-item.cited:hover { background: #dbeafe; }
    .source-title {
      font-weight: 600;
      font-size: 0.875rem;
      color: #1e40af;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .cite-badge {
      display: inline-block;
      background: #1e40af;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .source-file    { font-size: 0.75rem; color: #6b7280; margin-top: 1px; word-break: break-all; }
    .source-section { font-size: 0.75rem; color: #374151; margin-top: 2px; }
    .source-score   { font-size: 0.7rem; color: #9ca3af; margin-top: 2px; }
    .source-hint    { font-size: 0.68rem; color: #9ca3af; margin-top: 3px; }
    .sources-empty  { color: #9ca3af; font-size: 0.85rem; padding: 1rem; text-align: center; }

    /* ── Chunk viewer modal ── */
    .chunk-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; }
    .chunk-modal.hidden { display: none; }
    .chunk-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
    .chunk-modal-dialog {
      position: relative;
      background: #fff;
      border-radius: 10px;
      width: min(700px, 92vw);
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.28);
    }
    .chunk-modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid #e5e7eb; gap: 0.75rem;
    }
    .chunk-modal-titles { flex: 1; min-width: 0; }
    .chunk-modal-title {
      font-weight: 600; font-size: 0.9375rem; color: #111827;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chunk-modal-subtitle { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .chunk-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: #9ca3af; line-height: 1; padding: 0.1rem 0.25rem; flex-shrink: 0;
    }
    .chunk-modal-close:hover { color: #111827; }
    .chunk-modal-body { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
    .chunk-modal-text {
      white-space: pre-wrap; font-family: inherit;
      font-size: 0.875rem; line-height: 1.7; color: #374151;
    }
    .chunk-modal-text mark { background: #fef08a; color: inherit; border-radius: 2px; padding: 0 1px; }
    .chunk-modal-hint { font-size: 0.75rem; color: #9ca3af; padding: 0.5rem 1.25rem 0.75rem; border-top: 1px solid #f3f4f6; }

    /* ── Feedback thumbs ── */
    .feedback-bar {
      display: flex;
      gap: 0.375rem;
      margin-top: 0.375rem;
      padding-left: 0.1rem;
    }
    .thumb-btn {
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #9ca3af;
      line-height: 1;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .thumb-btn:hover { border-color: #9ca3af; color: #374151; }
    .thumb-btn.selected-up   { background: #dcfce7; border-color: #86efac; color: #15803d; }
    .thumb-btn.selected-down { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
    .thumb-btn:disabled { cursor: default; opacity: 0.6; }

    /* ── Responsive ── */
    @media (max-width: 900px) { .sources-pane { display: none; } }
    @media (max-width: 600px) { .history-pane { display: none; } }
  </style>
</head>
<body>

<header>
  <h1>Internal Docs Assistant</h1>
  <div class="header-spacer"></div>
  <span class="user-chip" id="userChip"></span>
  <button class="header-btn" id="ingestBtn" title="Rescan the docs folder and update the index">↺ Re-index</button>
  <a class="header-btn" href="/auth/logout" style="text-decoration:none">Sign out</a>
</header>

<div class="layout">

  <!-- Left: conversation history -->
  <div class="history-pane">
    <div class="history-pane-header">
      <button class="new-chat-btn" id="newChatBtn">
        <span>＋</span> New chat
      </button>
    </div>
    <div class="conv-list" id="convList">
      <p class="conv-list-empty">No conversations yet.</p>
    </div>
  </div>

  <!-- Centre: chat -->
  <div class="chat-pane">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="bubble">Hello! Ask me anything about the internal documentation.</div>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="questionInput" rows="1" placeholder="Ask a question about the docs…" autofocus></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- Right: sources -->
  <div class="sources-pane">
    <h2>Sources</h2>
    <div class="sources-list" id="sourcesList">
      <p class="sources-empty">Sources from the last answer will appear here.</p>
    </div>
  </div>

</div>

<!-- Chunk viewer modal -->
<div id="chunkModal" class="chunk-modal hidden">
  <div class="chunk-modal-backdrop" id="modalBackdrop"></div>
  <div class="chunk-modal-dialog">
    <div class="chunk-modal-header">
      <div class="chunk-modal-titles">
        <div class="chunk-modal-title" id="modalTitle"></div>
        <div class="chunk-modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="chunk-modal-close" id="modalClose" title="Close">✕</button>
    </div>
    <div class="chunk-modal-body"><pre class="chunk-modal-text" id="modalText"></pre></div>
    <div class="chunk-modal-hint" id="modalHint"></div>
  </div>
</div>

<script>
  const messagesEl    = document.getElementById('messages');
  const questionInput = document.getElementById('questionInput');
  const sendBtn       = document.getElementById('sendBtn');
  const sourcesList   = document.getElementById('sourcesList');
  const ingestBtn     = document.getElementById('ingestBtn');
  const convList      = document.getElementById('convList');
  const newChatBtn    = document.getElementById('newChatBtn');
  const userChip      = document.getElementById('userChip');
  const chunkModal    = document.getElementById('chunkModal');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalClose    = document.getElementById('modalClose');
  const modalTitle    = document.getElementById('modalTitle');
  const modalSubtitle = document.getElementById('modalSubtitle');
  const modalText     = document.getElementById('modalText');
  const modalHint     = document.getElementById('modalHint');

  let busy                  = false;
  let currentConversationId = null;   // null → new chat on next send
  let currentSources        = [];
  let currentCitations      = {};

  // ── Bootstrap ─────────────────────────────────────────────────────────────────

  async function init() {
    try {
      const me = await fetchJson('/api/me');
      userChip.textContent = me.name;
    } catch { /* ignore */ }
    await loadConversations();
  }

  init();

  // ── Conversation list ─────────────────────────────────────────────────────────

  async function loadConversations() {
    let convs;
    try { convs = await fetchJson('/api/conversations'); }
    catch { return; }

    convList.innerHTML = '';
    if (!convs.length) {
      convList.innerHTML = '<p class="conv-list-empty">No conversations yet.</p>';
      return;
    }

    for (const c of convs) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (c.id === currentConversationId ? ' active' : '');
      item.dataset.id = c.id;
      item.innerHTML =
        `<span class="conv-title" title="${escHtml(c.title)}">${escHtml(c.title)}</span>` +
        `<button class="conv-delete" title="Delete conversation" data-id="${c.id}">✕</button>`;

      item.addEventListener('click', () => openConversation(c.id));
      item.querySelector('.conv-delete').addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteConversation(c.id);
      });
      convList.appendChild(item);
    }
  }

  async function openConversation(id) {
    if (busy) return;

    currentConversationId = id;
    setActiveConvItem(id);

    let msgs;
    try { msgs = await fetchJson(`/api/conversations/${id}/messages`); }
    catch { return; }

    // Clear chat and re-render history messages.
    messagesEl.innerHTML = '';
    currentSources   = [];
    currentCitations = {};
    sourcesList.innerHTML = '<p class="sources-empty">Sources from the last answer will appear here.</p>';

    for (const m of msgs) {
      const bubble = appendMessage(m.role === 'user' ? 'user' : 'assistant', '');
      bubble.textContent = m.content;
    }
    scrollToBottom();
  }

  async function deleteConversation(id) {
    try {
      await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
    } catch { return; }

    if (currentConversationId === id) startNewChat();
    await loadConversations();
  }

  function startNewChat() {
    currentConversationId = null;
    messagesEl.innerHTML = `
      <div class="message assistant">
        <div class="bubble">Hello! Ask me anything about the internal documentation.</div>
      </div>`;
    currentSources   = [];
    currentCitations = {};
    sourcesList.innerHTML = '<p class="sources-empty">Sources from the last answer will appear here.</p>';
    setActiveConvItem(null);
    questionInput.focus();
  }

  function setActiveConvItem(id) {
    convList.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
  }

  newChatBtn.addEventListener('click', startNewChat);

  // ── Auto-grow textarea ────────────────────────────────────────────────────────

  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 130) + 'px';
  });
  questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!busy) sendQuestion(); }
  });
  sendBtn.addEventListener('click', () => { if (!busy) sendQuestion(); });

  // ── Re-index ──────────────────────────────────────────────────────────────────

  ingestBtn.addEventListener('click', async () => {
    ingestBtn.disabled = true;
    ingestBtn.textContent = 'Indexing…';
    try {
      await fetch('/api/ingest', { method: 'POST' });
      ingestBtn.textContent = '✓ Done';
    } catch {
      ingestBtn.textContent = '✗ Error';
    }
    setTimeout(() => { ingestBtn.textContent = '↺ Re-index'; ingestBtn.disabled = false; }, 2000);
  });

  // ── Send question ─────────────────────────────────────────────────────────────

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question) return;

    busy = true;
    sendBtn.disabled = true;
    questionInput.value = '';
    questionInput.style.height = 'auto';

    currentSources   = [];
    currentCitations = {};
    sourcesList.innerHTML = '<p class="sources-empty">Retrieving sources…</p>';

    appendMessage('user', question);
    const assistantBubble = appendMessage('assistant', '');
    const thinking = document.createElement('div');
    thinking.className = 'thinking';
    thinking.textContent = 'Thinking…';
    assistantBubble.appendChild(thinking);

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, conversationId: currentConversationId }),
      });

      if (!response.ok || !response.body) {
        thinking.remove();
        assistantBubble.textContent = `Error: ${response.statusText}`;
        return;
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer          = '';
      let answerText      = '';
      let thinkingRemoved = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop() ?? '';

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          const raw = part.slice(6).trim();
          if (raw === '[DONE]') break;

          let msg;
          try { msg = JSON.parse(raw); } catch { continue; }

          if (msg.t === 'sources') {
            currentSources = msg.v ?? [];
            // Server tells us the conversation ID for this exchange.
            if (msg.conversationId && msg.conversationId !== currentConversationId) {
              currentConversationId = msg.conversationId;
              await loadConversations();        // show new conversation in sidebar
              setActiveConvItem(currentConversationId);
            }
            renderSources(currentSources);
          } else if (msg.t === 'text') {
            if (!thinkingRemoved) { thinking.remove(); thinkingRemoved = true; }
            answerText += msg.v;
            assistantBubble.textContent = answerText;
            scrollToBottom();
          } else if (msg.t === 'saved') {
            // Attach thumbs buttons now that the answer is persisted.
            attachFeedback(assistantBubble.parentElement, msg.messageId);
          } else if (msg.t === 'error') {
            if (!thinkingRemoved) { thinking.remove(); thinkingRemoved = true; }
            assistantBubble.textContent = `Error: ${msg.v}`;
          }
        }
      }

      if (answerText) {
        currentCitations = extractCitations(answerText);
        finalizeAnswerBubble(assistantBubble, answerText);
        markCitedSources(currentCitations);
      }

    } catch (err) {
      thinking.remove();
      assistantBubble.textContent = `Error: ${err.message}`;
    } finally {
      busy = false;
      sendBtn.disabled = false;
      questionInput.focus();
    }
  }

  // ── Citation parsing ──────────────────────────────────────────────────────────

  function extractCitations(text) {
    const citations = {};
    const re = /([^\n.!?]*[.!?]?)\s*\[\^(\d+)\]/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      const sentence = m[1].trim();
      const idx      = parseInt(m[2], 10);
      if (!citations[idx]) citations[idx] = [];
      if (sentence) citations[idx].push(sentence);
    }
    return citations;
  }

  function finalizeAnswerBubble(bubble, answerText) {
    const html = escHtml(answerText).replace(/\[\^(\d+)\]/g, (_, n) =>
      `<sup><a class="cite-ref" href="#" data-src="${n}">[${n}]</a></sup>`
    );
    bubble.innerHTML = html;
    bubble.querySelectorAll('.cite-ref').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const src = currentSources.find(s => s.sourceIndex === parseInt(a.dataset.src, 10));
        if (src) openModal(src);
      });
    });
  }

  // ── Source sidebar ────────────────────────────────────────────────────────────

  function renderSources(sources) {
    if (!sources?.length) {
      sourcesList.innerHTML = '<p class="sources-empty">No matching documents found.</p>';
      return;
    }
    sourcesList.innerHTML = '';
    for (const s of sources) {
      const item = document.createElement('div');
      item.className = 'source-item';
      item.dataset.sourceIndex = s.sourceIndex;
      item.innerHTML = `
        <div class="source-title">[${s.sourceIndex}] ${escHtml(s.title || s.sourceFile)}</div>
        <div class="source-file">${escHtml(s.sourceFile)}</div>
        ${s.sectionHeading ? `<div class="source-section">§ ${escHtml(s.sectionHeading)}</div>` : ''}
        <div class="source-score">Score: ${(s.score * 100).toFixed(1)}%</div>
        <div class="source-hint">Click to view passage</div>
      `;
      item.addEventListener('click', () => openModal(s));
      sourcesList.appendChild(item);
    }
  }

  function markCitedSources(citations) {
    for (const [idxStr] of Object.entries(citations)) {
      const item = sourcesList.querySelector(`[data-source-index="${parseInt(idxStr, 10)}"]`);
      if (!item) continue;
      item.classList.add('cited');
      const titleEl = item.querySelector('.source-title');
      if (titleEl && !titleEl.querySelector('.cite-badge'))
        titleEl.insertAdjacentHTML('beforeend', '<span class="cite-badge">CITED</span>');
    }
  }

  // ── Chunk viewer modal ────────────────────────────────────────────────────────

  function openModal(source) {
    modalTitle.textContent    = source.title || source.sourceFile;
    modalSubtitle.textContent = [
      source.sourceFile,
      source.sectionHeading ? `§ ${source.sectionHeading}` : null,
    ].filter(Boolean).join('  ·  ');

    const citingSentences = currentCitations[source.sourceIndex] ?? [];
    const highlighted     = applyKeywordHighlights(source.chunkText ?? '', citingSentences);

    if (highlighted !== null) {
      modalText.innerHTML = highlighted;
      modalHint.textContent = citingSentences.length > 0
        ? 'Highlighted words were extracted from the answer that cited this source.'
        : '';
    } else {
      modalText.textContent = source.chunkText ?? '';
      modalHint.textContent = '';
    }
    chunkModal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    chunkModal.classList.add('hidden');
    document.body.style.overflow = '';
  }

  modalClose.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  // ── Keyword highlighting ──────────────────────────────────────────────────────

  const STOP_WORDS = new Set([
    'about','after','again','also','another','because','before','between','both',
    'could','does','done','each','every','from','have','here','into','just',
    'like','made','make','many','more','most','much','must','need','never',
    'only','other','over','same','should','some','such','than','that','their',
    'them','then','there','these','they','this','those','through','time',
    'under','very','want','well','were','what','when','where','which','while',
    'will','with','would','your',
  ]);

  function applyKeywordHighlights(rawText, citingSentences) {
    const keywords = [...new Set(
      citingSentences
        .flatMap(s => s.split(/\s+/))
        .map(w => w.replace(/[^\w]/g, '').toLowerCase())
        .filter(w => w.length >= 5 && !STOP_WORDS.has(w))
    )];

    const escaped = escHtml(rawText);
    if (!keywords.length) return escaped;

    keywords.sort((a, b) => b.length - a.length);
    let html = escaped;
    for (const kw of keywords) {
      html = html.replace(new RegExp(`\\b(${escRegex(kw)})\\b`, 'gi'), '<mark>$1</mark>');
    }
    return html;
  }

  // ── Feedback ──────────────────────────────────────────────────────────────────

  function attachFeedback(messageEl, messageId) {
    const bar = document.createElement('div');
    bar.className = 'feedback-bar';

    const up   = makeThumb('👍', 1,  messageId, bar);
    const down = makeThumb('👎', -1, messageId, bar);
    bar.append(up, down);
    messageEl.appendChild(bar);
  }

  function makeThumb(emoji, rating, messageId, bar) {
    const btn = document.createElement('button');
    btn.className = 'thumb-btn';
    btn.textContent = emoji;
    btn.addEventListener('click', async () => {
      try {
        await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messageId, rating }),
        });
        bar.querySelectorAll('.thumb-btn').forEach(b => {
          b.disabled = true;
          b.classList.remove('selected-up', 'selected-down');
        });
        btn.classList.add(rating === 1 ? 'selected-up' : 'selected-down');
      } catch { /* ignore */ }
    });
    return btn;
  }

  // ── Utilities ─────────────────────────────────────────────────────────────────

  function appendMessage(role, text) {
    const msgEl  = document.createElement('div');
    msgEl.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msgEl.appendChild(bubble);
    messagesEl.appendChild(msgEl);
    scrollToBottom();
    return bubble;
  }

  async function fetchJson(url, opts) {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
</script>
</body>
</html>
