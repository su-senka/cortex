name: cortex

services:

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    ports:
      - "18888:18888"   # Dashboard UI  →  http://localhost:18888
      - "18889:18889"   # OTLP gRPC receiver
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    restart: unless-stopped

  app:
    build: .
    image: cortex-rag:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/docs
      - ado-cache:/docs/ado-sync
      - rag-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ollama__BaseUrl: http://ollama:11434
      Rag__VectorDbPath: /data/rag_store.db
      Rag__DocsFolder: /docs
      Oidc__Authority: http://keycloak:8080/realms/cortex
      Oidc__ClientId: cortex-app
      Oidc__ClientSecret: cortex-secret
      Oidc__RequireHttpsMetadata: "false"
      Oidc__ValidateIssuer: "false"
      Oidc__ValidateAudience: "true"
      Oidc__ValidAudiences__0: "cortex-app"
      AzureDevOps__BaseUrl: ""
      AzureDevOps__Project: ""
      AzureDevOps__Repository: ""
      AzureDevOps__Path: "/"
      AzureDevOps__Branch: "main"
      AzureDevOps__PersonalAccessToken: ""
      AzureDevOps__WebhookSecret: ""
      OTEL_SERVICE_NAME: cortex
      OTEL_EXPORTER_OTLP_ENDPOINT: http://aspire-dashboard:18889
    depends_on:
      model-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    restart: unless-stopped

  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text &&
        ollama pull qwen2.5:7b-instruct-q4_K_M
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  rag-data:
  ado-cache:
  ollama-models:
  keycloak-data:
