name: cortex

services:

  app:
    build: .
    image: cortex-rag:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/docs              # bind-mount your docs folder
      - ado-cache:/docs/ado-sync  # named volume for ADO-synced files
      - rag-data:/data            # SQLite DB + metadata survive container replacement
    environment:
      Ollama__BaseUrl: http://ollama:11434
      Rag__VectorDbPath: /data/rag_store.db
      Rag__DocsFolder: /docs
      # Keycloak OIDC — set Authority to https://keycloak.example.com/realms/your-realm
      Oidc__Authority: ""
      Oidc__ClientId: ""
      Oidc__ClientSecret: ""
      # Azure DevOps ingestion — leave BaseUrl empty to disable
      AzureDevOps__BaseUrl: ""
      AzureDevOps__Project: ""
      AzureDevOps__Repository: ""
      AzureDevOps__Path: "/"
      AzureDevOps__Branch: "main"
      AzureDevOps__PersonalAccessToken: ""
      AzureDevOps__WebhookSecret: ""
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama   # models live here; see scripts/pull-models.sh
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    # CPU-only by default. To use a GPU add:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  rag-data:
  ado-cache:
  ollama-models:
