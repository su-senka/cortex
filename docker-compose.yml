name: cortex

services:

  app:
    build: .
    image: cortex-rag:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docs:/docs              # bind-mount your docs folder
      - ado-cache:/docs/ado-sync  # named volume for ADO-synced files
      - rag-data:/data            # SQLite DB + metadata survive container replacement
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ollama__BaseUrl: http://ollama:11434
      Rag__VectorDbPath: /data/rag_store.db
      Rag__DocsFolder: /docs
      Oidc__Authority: http://keycloak:8080/realms/cortex
      Oidc__PublicOrigin: http://localhost:8180
      Oidc__ClientId: cortex-app
      Oidc__ClientSecret: cortex-secret
      # Docker-specific OIDC overrides:
      # Keycloak is reached over the internal Docker network (HTTP), so HTTPS metadata
      # and issuer validation cannot apply without a proper TLS setup.
      # For a true production deployment with HTTPS Keycloak, remove these overrides
      # and set ValidIssuers__0 to your realm URL instead.
      Oidc__RequireHttpsMetadata: "false"
      Oidc__ValidateIssuer: "false"
      Oidc__ValidateAudience: "true"
      Oidc__ValidAudiences__0: "cortex-app"
      # Azure DevOps ingestion — leave BaseUrl empty to disable
      AzureDevOps__BaseUrl: ""
      AzureDevOps__Project: ""
      AzureDevOps__Repository: ""
      AzureDevOps__Path: "/"
      AzureDevOps__Branch: "main"
      AzureDevOps__PersonalAccessToken: ""
      AzureDevOps__WebhookSecret: ""
    depends_on:
      model-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  # Pulls Ollama models into the shared volume on first run (no-op if already present).
  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text &&
        ollama pull qwen2.5:7b-instruct-q4_K_M
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    # CPU-only by default. To use a GPU add:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  rag-data:
  ado-cache:
  ollama-models:
  keycloak-data: