name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build solution
        run: dotnet build Cortex.sln --configuration Release

      - name: Run tests
        run: dotnet test src/RagAssistant.Tests --configuration Release --no-build --verbosity normal

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/RagAssistant.Web/ClientApp/package-lock.json

      - name: Build frontend
        working-directory: src/RagAssistant.Web/ClientApp
        run: |
          npm ci
          npm run build

  docker-build:
    # Verify the production image builds; publishing happens in release.yml on tags.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
