# GitHub Codespaces overrides.
# Usage: ./start-codespaces.sh  (do not run docker compose directly — the script
# generates .env with the correct KEYCLOAK_PUBLIC_URL for the current session).
#
# KC_PROXY_HEADERS lets Keycloak know it is behind the Codespaces TLS proxy so it
# sets cookies with Secure and builds redirect URLs with the correct public origin.

services:
  app:
    environment:
      Oidc__PublicOrigin: ${KEYCLOAK_PUBLIC_URL}

  keycloak:
    environment:
      KC_PROXY_HEADERS: xforwarded
